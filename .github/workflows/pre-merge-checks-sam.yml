name: Pre-merge checks for SAM
on:
  pull_request:
    paths: ["template.yaml"]
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

jobs:
  sam-checks:
    name: SAM validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up SAM cli
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v2
        with:
          use-installer: true

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ secrets.GHA_BUILD_ROLE }}
          aws-region: eu-west-2

      - name: SAM validate
        run: sam validate --lint
