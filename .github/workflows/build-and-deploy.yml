name: "Build : Build and deploy smoke tests"
# This workflow builds and deploys smoke tests for the authentication module.

on:
  push:
    branches:
      - main

jobs:
  pr-data:
    name: Get data for merged PR
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/call_get_pr_data.yml

  deploy:
    needs: pr-data
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up SAM cli
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v2
        with:
          use-installer: true
          version: 1.159.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.22.2"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts --omit=dev

      - name: Build smoke tests
        run: npm run build:all

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.GHA_BUILD_ROLE }}
          aws-region: eu-west-2

      - name: SAM build
        run: |
          sam validate --lint -t template.yaml
          sam build --parallel -t template.yaml

      - name: Extract PR number and commit message
        id: version_info
        run: |
          HEAD_MESSAGE=$(git log -1 --format=%s)
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "$HEAD_MESSAGE" =~ \(#([0-9]+)\) ]]; then
            VERSION="#${BASH_REMATCH[1]} - ${HEAD_MESSAGE}"
          else
            VERSION="${SHORT_SHA}${HEAD_MESSAGE:+: $HEAD_MESSAGE}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Deploy SAM app # synthetics-directory is used for synthetics canary Artifacts upload to S3
        uses: govuk-one-login/devplatform-upload-action@64e46134b4108ebfa1cf2a64fee00782f8e2e8cf #v4.1.0
        with:
          artifact-bucket-name: ${{ secrets.ARTIFACT_BUCKET }}
          signing-profile-name: ${{ secrets.SIGNING_PROFILE_NAME }}
          template-file: .aws-sam/build/template.yaml
          synthetics-directory: ./dist
          version: ${{ steps.version_info.outputs.version }}
